<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Financial Record</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" type="text/css" href="finanical.css">
   
</head>
<body>
        <div>
    <h1 id="date">Hello Pawan</h1>
       </div>
       
    <form id="financeform" method="Post">
            <label id="typeLabel"> Income/Outcome: 
                <select id="Type" size="1" >
                    <option value="Income"> Income </option> 
                    <option value="Outcome"> Outcome </option>
                </select>
            </label>
                <br>
            <label id="walletLabel"> Wallet/bank:
                         <select id="Wallet" size="1" maxlength="10" name="Wallet">
                         <option value="Esawa"> Esawa</option>
                         <option value="Kalthi"> khalti</option>
                         <option value="Citypay"> Citypay</option>
                         <option value="Bank"> Bank</option>
                         <option value="Cash"> Cash</option>
                </select>   
            </label>
                <br>
          <div>  <label id="amountLabel"> Amount: 
             <input type="number" step="0.01" placeholder="Amount" id="Amount"> 
         </label> </div> 
        <div> <label id="sourceLabel"> Source:
             <input type="Text" name="Source" id="Source"> 
         </label> </div>
            <button type="button" id="previewBtn" >preview </button>
       <div id="previewbox">
        
       </div>
       <button type="submit" id="submitBtn"> submit</button>
    
     </form>  
    </div>
      <script src="finanical.js"></script>
</body>
</html>
